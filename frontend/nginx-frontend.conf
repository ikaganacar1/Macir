server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Stop Nginx from returning index.html for missing JavaScript chunks.
    # This prevents the "Uncaught SyntaxError: Unexpected token '<'" error.
    location /assets/ {
        try_files $uri =404;
    }

    # Standard SPA fallback for routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}