services:
  backend:
    build:
      context: ./backend
    environment:
      SECRET_KEY: change-me-in-production
      DEBUG: "false"
      EXTRA_ALLOWED_ORIGINS: "http://100.74.141.51:81,http://100.74.141.51"
    volumes:
      - db_data:/app/db
      - media_data:/app/media
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    ports:
      - "81:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  db_data:
  media_data:
